# Workflow: Full Creative Project
## Squad Audiovisual Stark — AS-WF-001

id: wf-full-project
version: "1.0"
name: "Full Creative Project Orchestration"
description: >
  Complete end-to-end creative project workflow. Orchestrates all agents from
  brief diagnosis through final delivery. Use when a client needs a full creative
  project (brand identity, campaign, landing page, etc.) with no phase skipped.

entry_agent: studio-chief
estimated_duration: "2h - 5h depending on scope"
complexity: high

---

## Trigger Conditions

trigger:
  commands:
    - "*orchestrate"
    - "*brand"
  keywords:
    - "projeto completo"
    - "full project"
    - "criar marca"
    - "identidade visual completa"
    - "campanha completa"
  studio_chief_routing:
    - brand_identity
    - full_campaign
    - rebranding

---

## Phases

phases:

  - id: phase-1
    name: "Brief & Diagnosis"
    agent: brief-analyst
    task: tasks/brief-analysis.md
    command: "*brief"
    description: >
      Transform client request into a validated creative brief.
      Must complete 8-block structure and score >= 7/8 before proceeding.
    inputs:
      - client_request: "raw brief or conversation"
      - optional_context: "existing brand materials, competitors, references"
    outputs:
      - validated_brief: "8-block creative brief, score >= 7/8"
      - persona_card: "target audience profile"
      - problem_statement: "1-sentence clarity test"
    gate:
      condition: "brief_score >= 7"
      on_fail: "return to @brief-analyst with missing blocks identified"
    next: phase-2

  - id: phase-2
    name: "Brand Strategy"
    agent: brand-strategist
    task: tasks/brand-strategy.md
    command: "*brand-strategy"
    description: >
      Build brand strategy from validated brief. Define positioning,
      personality, naming (if needed), and competitive differentiation.
    inputs:
      - validated_brief: "from phase-1"
      - competitive_landscape: "optional, gathered in phase-1"
    outputs:
      - onliness_statement: "1-sentence brand differentiation"
      - brand_personality: "5 adjectives + tone spectrum"
      - naming_options: "3-5 options if naming needed (7 filters applied)"
      - brand_gap_audit: "5-dimension score"
    gate:
      condition: "onliness_statement_complete AND brand_gap_score >= 3/5"
      on_fail: "refine strategy with @brand-strategist"
    next: phase-3
    skip_if: "brief indicates no strategy needed (e.g., existing brand with defined strategy)"

  - id: phase-3
    name: "Art Direction"
    agent: art-director
    task: tasks/art-direction.md
    command: "*art-direction"
    description: >
      Define visual language. Translate brand strategy into visual concept,
      moodboard, typography system, color system, and composition direction.
    inputs:
      - validated_brief: "from phase-1"
      - brand_strategy: "from phase-2"
    outputs:
      - art_direction_document: "full visual language spec"
      - moodboard_concept: "3-5 reference directions"
      - typography_system: "H1, H2, body, caption specs"
      - color_system: "primary, secondary, neutral, emotional mapping"
      - composition_direction: "grid, density, whitespace approach"
    gate:
      condition: "art_direction_document_complete"
      on_fail: "refine direction with @art-director"
    next: phase-4

  - id: phase-4
    name: "Design Execution"
    agent: "varies — see routing"
    task: "varies — see routing"
    description: >
      Execute actual design deliverables based on project type.
      Route to appropriate specialist agent.
    routing:
      brand_identity: "@identity-designer *create-identity"
      social_media: "@social-designer *create-post or *feed-design"
      landing_page: "@landing-designer *landing-concept"
      ux_interface: "@ux-ui-designer *ui-design"
      motion: "@motion-designer *motion-concept"
      multi_deliverable: "execute in sequence, @studio-chief coordinates"
    inputs:
      - art_direction_document: "from phase-3"
      - brand_strategy: "from phase-2"
      - validated_brief: "from phase-1"
    outputs:
      - design_deliverables: "all items from brief deliverables table"
    gate:
      condition: "all deliverables from brief table completed"
      on_fail: "return to responsible specialist agent"
    next: phase-5

  - id: phase-5
    name: "UX Review (if applicable)"
    agent: ux-ui-designer
    task: tasks/ux-audit.md
    command: "*ux-audit or *heuristic-review"
    description: >
      Apply Nielsen-Norman 10 heuristics to interfaces, landing pages,
      or interactive deliverables. Skip for print/static assets.
    inputs:
      - design_deliverables: "from phase-4 (interfaces/pages only)"
      - user_goal: "from brief"
      - persona: "from phase-1"
    outputs:
      - heuristic_scores: "H1-H10 with evidence"
      - ux_issues: "Critical/High/Medium/Low"
      - top_3_recommendations: "specific fixes"
    gate:
      condition: "average_score >= 3.5/5 AND no critical issues"
      on_fail: "return to @landing-designer or @ux-ui-designer with specific fixes"
    skip_if: "deliverables are static (print, logo, social posts only)"
    next: phase-6

  - id: phase-6
    name: "Design Review — GO/NO-GO"
    agent: design-critic
    task: tasks/design-review.md
    command: "*review"
    description: >
      Critical 7-criteria review. Scores and decides whether deliverables
      are production-ready. GO requires >= 7.0/10, criteria 1 and 2 >= 6.
    inputs:
      - all_deliverables: "from phase-4 and phase-5"
      - original_brief: "from phase-1"
      - art_direction: "from phase-3"
    outputs:
      - weighted_score: "X.X/10"
      - verdict: "GO or NO-GO"
      - blocking_issues: "list with specific fixes if NO-GO"
      - recommended_improvements: "non-blocking items"
    gate:
      condition: "verdict == GO"
      on_fail: "route to responsible agent based on failing criterion, max 2 iterations"
    next: phase-7

  - id: phase-7
    name: "Final Delivery"
    agent: studio-chief
    command: "*status"
    description: >
      Compile final deliverables package. Generate delivery summary.
      Confirm all items from brief deliverables table are included.
    inputs:
      - reviewed_deliverables: "from phase-6"
      - original_brief: "from phase-1"
    outputs:
      - delivery_package: "all approved deliverables"
      - delivery_summary: "what was delivered, format, status"
      - retrospective: "what went well, what to improve"
    gate:
      condition: "all brief deliverables present AND design_review == GO"
      on_fail: "identify missing items and route back"

---

## Error Handling

error_handling:

  brief_insufficient:
    trigger: "brief_score < 7 after 2 attempts"
    action: "escalate to @studio-chief, request client meeting"

  strategy_loop:
    trigger: "brand_gap_score < 3/5 after 2 iterations"
    action: "pause workflow, flag to @studio-chief for scope review"

  design_no_go_loop:
    trigger: "design_review NO-GO for 2+ consecutive reviews"
    action: >
      escalate to @studio-chief
      review if brief was well-defined (phase-1 root cause)
      may restart from phase-3 with revised direction

  scope_creep:
    trigger: "new deliverables added after phase-1"
    action: >
      STOP workflow
      return to @brief-analyst to update brief
      re-validate brief before proceeding
      do NOT add deliverables mid-workflow without brief update

---

## Shortcuts (Fast-Track Modes)

shortcuts:

  brand_identity_only:
    phases: [1, 2, 3, "phase-4:identity-designer", 6, 7]
    skip: [5]
    estimated: "1.5h - 3h"

  social_media_pack:
    phases: [1, 3, "phase-4:social-designer", 6, 7]
    skip: [2, 5]
    note: "Skip strategy if brand already exists"
    estimated: "45m - 2h"

  landing_page:
    phases: [1, 2, 3, "phase-4:landing-designer", 5, 6, 7]
    skip: []
    estimated: "2h - 4h"

  quick_review:
    phases: [6]
    skip: [1, 2, 3, 4, 5, 7]
    note: "Brief must be provided externally"
    estimated: "30m - 1h"

---

## Quality Standards

quality_standards:
  brief_threshold: 7  # out of 8
  brand_gap_minimum: 3  # out of 5
  ux_score_minimum: 3.5  # out of 5 (if applicable)
  design_review_go_threshold: 7.0  # out of 10
  criteria_1_minimum: 6  # Brief Alignment (auto-NO-GO if below 5)
  criteria_2_minimum: 6  # Audience Fit (auto-NO-GO if below 5)
  max_no_go_iterations: 2  # before escalation to studio-chief

